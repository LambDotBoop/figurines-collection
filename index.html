<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя коллекция фигурок</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/15427/15427945.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #18181f;
            --surface3: #1e1e28;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.14);
            --accent: #7c6cfc;
            --accent2: #c084fc;
            --accent-glow: rgba(124,108,252,0.35);
            --shipping: #10d9a0;
            --shipping-glow: rgba(16,217,160,0.3);
            --received: #4a5568;
            --danger: #fc6c6c;
            --text: #f0f0f8;
            --text2: #8888aa;
            --text3: #55556a;
            --success: #10d9a0;
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%; left: -20%;
            width: 60%; height: 60%;
            background: radial-gradient(ellipse, rgba(124,108,252,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%; right: -10%;
            width: 50%; height: 50%;
            background: radial-gradient(ellipse, rgba(192,132,252,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 24px 60px;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            background: rgba(17,17,24,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-brand h1 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-brand p {
            font-size: 12px;
            color: var(--text3);
            margin-top: 2px;
        }

        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-ghost:hover {
            border-color: var(--border-hover);
            color: var(--text);
            background: var(--surface2);
        }

        /* STATS */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: var(--border-hover); }
        .stat-value {
            font-family: 'Inter', sans-serif;
            font-size: 26px;
            font-weight: 700;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text3);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card.accent .stat-value { color: var(--accent); }
        .stat-card.shipping-card .stat-value { color: var(--shipping); }

        /* CONTROLS */
        .controls-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-box { flex: 1; min-width: 200px; position: relative; }
        .search-box input[type="text"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 38px 10px 40px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box input::placeholder { color: var(--text3); }
        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            pointer-events: none;
            display: block;
        }
        .clear-icon {
            position: absolute;
            right: 10px; top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 2px 4px;
            transition: color 0.2s;
        }
        .clear-icon:hover { color: var(--text); }

        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--text2);
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 16px var(--accent-glow);
        }
        .sort-select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .sort-select:focus { outline: none; border-color: var(--accent); }

        /* LAYOUT */
        .container {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            align-items: start;
        }

        /* CARDS */
        .figurines-list { display: flex; flex-direction: column; gap: 12px; }

        .figurine-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: grid;
            grid-template-columns: 110px 1fr auto;
            gap: 16px;
            align-items: flex-start;
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .figurine-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: transparent;
            transition: background 0.25s;
        }
        .figurine-item:hover {
            border-color: var(--border-hover);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(-2px);
        }
        .figurine-item.shipping {
            border-color: rgba(16,217,160,0.25);
            background: linear-gradient(135deg, rgba(16,217,160,0.05) 0%, var(--surface) 40%);
        }
        .figurine-item.shipping::before { background: var(--shipping); }
        .figurine-item.received { border-color: rgba(255,255,255,0.04); opacity: 0.55; }
        .figurine-item.received::before { background: var(--received); }

        .figurine-photo {
            width: 110px; height: 110px;
            border-radius: 10px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text3);
            font-size: 11px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .figurine-photo img { width: 100%; height: 100%; object-fit: cover; }

        .figurine-info { display: flex; flex-direction: column; gap: 6px; min-width: 0; }

        .figurine-name {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .figurine-date { font-size: 12px; color: var(--text3); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
            width: fit-content;
        }
        .status-badge.shipping { background: rgba(16,217,160,0.12); color: var(--shipping); border: 1px solid rgba(16,217,160,0.25); }
        .status-badge.waiting { background: rgba(255,255,255,0.04); color: var(--text3); border: 1px solid var(--border); }
        .status-badge.received-badge { background: rgba(74,85,104,0.2); color: #8899aa; border: 1px solid rgba(74,85,104,0.3); }

        .price-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
        .price-tag {
            background: var(--surface3);
            border: 1px solid var(--border);
            padding: 3px 9px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text2);
        }
        .price-tag strong { color: var(--accent2); font-weight: 600; }
        .price-tag-total { background: rgba(124,108,252,0.1); border-color: rgba(124,108,252,0.25); }
        .price-tag-total strong { color: var(--accent); }

        .figurine-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            opacity: 0;
            transform: translateX(6px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .checkbox-container {
            opacity: 0;
            transform: translateX(6px);
            transition: opacity 0.2s, transform 0.2s;
        }
        .figurine-item:hover .figurine-actions,
        .figurine-item:hover .checkbox-container { opacity: 1; transform: translateX(0); }

        .icon-btn {
            width: 32px; height: 32px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0;
            color: var(--text2);
        }
        .icon-btn:hover { background: var(--surface3); border-color: var(--border-hover); color: var(--text); transform: scale(1.1); }
        .icon-btn.delete:hover { border-color: rgba(252,108,108,0.4); color: var(--danger); background: rgba(252,108,108,0.08); }
        .icon-btn.check { color: var(--text3); }
        .icon-btn.check:hover { border-color: rgba(16,217,160,0.4); color: var(--shipping); background: rgba(16,217,160,0.08); }
        .icon-btn.check.checked { border-color: rgba(16,217,160,0.5); color: var(--shipping); background: rgba(16,217,160,0.12); }

        .received-checkbox { width: 18px; height: 18px; accent-color: var(--shipping); cursor: pointer; }

        /* FORM SIDEBAR */
        .form-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            position: sticky;
            top: 20px;
        }
        .form-section h2 {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .form-toggle-arrow { transition: transform 0.3s ease; display: none; }
        .form-section.active .form-toggle-arrow { transform: rotate(180deg); }

        .form-group { margin-bottom: 14px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input::placeholder { color: var(--text3); }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

        button { font-family: 'Inter', sans-serif; cursor: pointer; }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            border: none;
            color: white;
            padding: 11px 18px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-primary:hover { background: #6b5be0; box-shadow: 0 6px 24px var(--accent-glow); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .btn-danger-outline {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(252,108,108,0.25);
            color: rgba(252,108,108,0.7);
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-danger-outline:hover { background: rgba(252,108,108,0.08); border-color: rgba(252,108,108,0.5); color: var(--danger); }

        .image-upload-area {
            border: 1px dashed var(--border-hover);
            border-radius: var(--radius-sm);
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface2);
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        .image-upload-area:hover, .image-upload-area.drag-over {
            border-color: var(--accent);
            background: rgba(124,108,252,0.05);
        }
        .upload-text { font-size: 13px; color: var(--text2); }
        .upload-hint { font-size: 11px; color: var(--text3); }
        .image-preview {
            width: 100%;
            max-height: 120px;
            object-fit: contain;
            display: none;
            margin-top: 8px;
            border-radius: 6px;
        }
        .image-buttons { display: flex; gap: 8px; margin-top: 10px; width: 100%; }
        .image-buttons button {
            flex: 1;
            background: var(--surface3);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 7px 10px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .image-buttons button:hover { border-color: var(--border-hover); color: var(--text); }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border-hover);
            border-radius: 20px;
            padding: 28px;
            max-width: 460px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
        }
        .modal h2 {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 22px;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button { flex: 1; padding: 11px; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; border: none; }
        .modal-save { background: var(--accent); color: white; box-shadow: 0 4px 12px var(--accent-glow); transition: all 0.2s; }
        .modal-save:hover { background: #6b5be0; }
        .modal-cancel { background: var(--surface3); color: var(--text2); transition: all 0.2s; }
        .modal-cancel:hover { background: var(--surface2); color: var(--text); }

        /* EMPTY STATE */
        .empty-state {
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            padding: 60px 40px;
            text-align: center;
            width: 100%;
        }
        .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text2); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; color: var(--text3); }

        /* NOTIFICATION */
        .notification {
            position: fixed;
            top: 20px; right: 20px;
            background: var(--surface2);
            border: 1px solid rgba(16,217,160,0.3);
            color: var(--shipping);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 2000;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

        .form-divider { height: 1px; background: var(--border); margin: 16px 0; }
        .mobile-bottom-bar { display: none; }

        /* MOBILE */
        @media (max-width: 900px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .page-wrapper { padding: 12px 12px 40px; }
            .container { display: flex; flex-direction: column; }

            .form-section { position: static !important; order: -1; width: 100%; margin-bottom: 0; }
            .form-section h2 { cursor: pointer; margin-bottom: 0; }
            .form-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
            .form-section.active .form-content { max-height: 2000px; }
            .form-section.active h2 { margin-bottom: 20px; }
            .form-toggle-arrow { display: block !important; }

            .header-actions { width: 100%; }
            .header-actions .btn-ghost { flex: 1; justify-content: center; }

            .figurines-list { 
				gap: 12px;
				width: 100%;
			}
            .figurine-item {
                display: flex !important;
                flex-direction: column !important;
                padding: 16px !important;
            }
            .figurine-item:hover { transform: none !important; }
            .figurine-item::before { display: none; }

            .figurine-photo {
                width: 100% !important;
                height: 240px !important;
                position: relative !important;
                margin-bottom: 12px !important;
                border-radius: 10px !important;
                overflow: hidden !important;
                flex-shrink: 0;
            }
            .figurine-photo img {
                width: 100% !important;
                height: 100% !important;
                object-fit: contain !important;
                object-position: center !important;
            }

            .checkbox-container {
                position: absolute !important;
                top: 10px !important;
                right: 10px !important;
                opacity: 1 !important;
                transform: none !important;
                pointer-events: auto !important;
                z-index: 10 !important;
background: none !important;
            }

            .figurine-info {
                display: flex !important;
                flex-direction: column !important;
                gap: 8px !important;
                margin-bottom: 12px !important;
                padding: 0 !important;
            }

            .figurine-actions { display: none !important; }
            .mobile-bottom-bar { display: flex !important; flex-direction: row !important; justify-content: flex-end !important; align-items: center !important; gap: 10px !important; padding-top: 12px !important; border-top: 1px solid var(--border) !important; margin-top: 12px !important; align-self: stretch !important; }
            .icon-btn { width: 36px !important; height: 36px !important; }
        }

        @keyframes notifIn {
            from { transform: translateX(120px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes notifOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120px); opacity: 0; }
        }

        /* LIGHTBOX */
        .lightbox-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }
        .lightbox-overlay.active { display: flex; }
        .lightbox-img {
            max-width: 90vw;
            max-height: 88vh;
            border-radius: 14px;
            object-fit: contain;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .lightbox-close {
            position: fixed;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            background: var(--surface2);
            border: 1px solid var(--border-hover);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text2);
            transition: all 0.2s;
            z-index: 3001;
        }
        .lightbox-close:hover {
            background: var(--surface3);
            color: var(--text);
            border-color: var(--accent);
            transform: scale(1.08);
        }
        .figurine-photo.has-photo { cursor: zoom-in; }

        /* CONFIRM MODAL */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .confirm-overlay.active { display: flex; }
        .confirm-box {
            background: var(--surface);
            border: 1px solid var(--border-hover);
            border-radius: 16px;
            padding: 28px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }
        .confirm-box h3 {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .confirm-box p {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 22px;
            line-height: 1.5;
        }
        .confirm-actions { display: flex; gap: 10px; }
        .confirm-actions button { flex: 1; padding: 10px; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
        .confirm-ok { background: var(--danger); color: white; transition: all 0.2s; }
        .confirm-ok:hover { background: #e05555; }
        .confirm-cancel { background: var(--surface3); color: var(--text2); transition: all 0.2s; }
        .confirm-cancel:hover { background: var(--surface2); color: var(--text); }
    </style>
</head>
<body>
<div class="page-wrapper">

    <header id="mainHeader">
        <div class="header-brand">
            <h1>Коллекция фигурок</h1>
            <p>Управление предзаказами и доставкой</p>
        </div>
        <div class="header-actions">
            <button class="btn-ghost" id="exportBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Сохранить
            </button>
            <button class="btn-ghost" id="importBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Загрузить
            </button>
        </div>
    </header>

    <div class="stats-bar" id="statsBar"></div>

    <div class="controls-bar">
        <div class="search-box">
            <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Поиск по названию...">
            <span class="clear-icon" id="clearSearch">×</span>
        </div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="shipping">В пути</button>
            <button class="filter-btn" data-filter="waiting">Ожидание</button>
            <button class="filter-btn" data-filter="received">Получено</button>
        </div>
        <select id="sortSelect" class="sort-select">
            <option value="date-added">Новые сначала</option>
            <option value="date-added-rev">Старые сначала</option>
            <option value="name-asc">По имени А–Я</option>
            <option value="name-desc">По имени Я–А</option>
        </select>
    </div>

    <div class="container">
        <div class="figurines-list" id="figurinesList"></div>

        <div class="form-section" id="formSection">
            <h2 class="form-toggle">
                Добавить фигурку
                <span class="form-toggle-arrow">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                </span>
            </h2>
            <div class="form-content">
                <div class="form-group">
                    <label>Фото</label>
                    <div class="image-upload-area" id="uploadArea">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M4 16L8.586 11.414C9.367 10.633 10.633 10.633 11.414 11.414L16 16M14 14L15.586 12.414C16.367 11.633 17.633 11.633 18.414 12.414L20 14M14 8H14.01M6 20H18C19.105 20 20 19.105 20 18V6C20 4.895 19.105 4 18 4H6C4.895 4 4 4.895 4 6V18C4 19.105 4.895 20 6 20Z" stroke="#55556a" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <p class="upload-text">Перетащите или вставьте</p>
                        <p class="upload-hint">Ctrl+V чтобы вставить из буфера</p>
                        <img class="image-preview" id="preview">
                        <div class="image-buttons">
                            <button type="button" id="fileBtn">Выбрать файл</button>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display:none">
                </div>
                <div class="form-group">
                    <label>Название *</label>
                    <input type="text" id="name" placeholder="Chibi Figurine...">
                </div>
                <div class="form-group">
                    <label>Дата заказа *</label>
                    <input type="date" id="orderDate">
                </div>
                <div class="form-divider"></div>
                <div class="form-group">
                    <label>Предоплата (₽)</label>
                    <input type="number" id="prepayment" placeholder="1 000">
                </div>
                <div class="form-group">
                    <label>Полная оплата (₽)</label>
                    <input type="number" id="payment" placeholder="10 000">
                </div>
                <div class="form-group">
                    <label>Доставка до Москвы (₽)</label>
                    <input type="number" id="deliveryMoscow" placeholder="2 000">
                </div>
                <div class="form-group">
                    <label>Доставка до дома (₽)</label>
                    <input type="number" id="deliveryHome" placeholder="1 000">
                </div>
                <button class="btn-primary" id="addBtn">Добавить фигурку</button>
                <button class="btn-danger-outline" id="resetBtn">Очистить всё</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal" id="modalBox">
        <h2>Редактировать</h2>
        <div class="form-group"><label>Название *</label><input type="text" id="editName"></div>
        <div class="form-group"><label>Дата заказа *</label><input type="date" id="editOrderDate"></div>
        <div class="form-divider"></div>
        <div class="form-group"><label>Предоплата (₽)</label><input type="number" id="editPrepayment"></div>
        <div class="form-group"><label>Полная оплата (₽)</label><input type="number" id="editPayment"></div>
        <div class="form-group"><label>Доставка до Москвы (₽)</label><input type="number" id="editDeliveryMoscow"></div>
        <div class="form-group"><label>Доставка до дома (₽)</label><input type="number" id="editDeliveryHome"></div>
        <div class="modal-actions">
            <button class="modal-save" id="saveEditBtn">Сохранить</button>
            <button class="modal-cancel" id="cancelEditBtn">Отмена</button>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightboxOverlay">
    <button class="lightbox-close" id="lightboxClose">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
</div>


<!-- Confirm Modal -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box" id="confirmBox">
        <h3 id="confirmTitle">Удалить фигурку?</h3>
        <p id="confirmText"></p>
        <div class="confirm-actions">
            <button class="confirm-ok" id="confirmOk">Удалить</button>
            <button class="confirm-cancel" id="confirmCancel">Отмена</button>
        </div>
    </div>
</div>


<input type="file" id="importFileInput" accept=".json" style="display:none">

<script>
    let figurines = [];
    let currentImage = null;
    let editingIndex = null;
    let currentFilter = 'all';
    let currentSort = 'date-added';
    let searchQuery = '';

    const list = document.getElementById('figurinesList');
    const uploadArea = document.getElementById('uploadArea');
    const preview = document.getElementById('preview');
    const fileInput = document.getElementById('fileInput');
    const importFileInput = document.getElementById('importFileInput');
    const editModal = document.getElementById('editModal');
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    const clearSearch = document.getElementById('clearSearch');

    document.getElementById('orderDate').valueAsDate = new Date();

    // Page load animation
    window.addEventListener('load', () => {
        gsap.from('#mainHeader', { y: -20, opacity: 0, duration: 0.6, ease: 'power3.out' });
        gsap.from('.stats-bar', { y: -10, opacity: 0, duration: 0.5, delay: 0.1, ease: 'power3.out' });
        gsap.from('.controls-bar', { y: -10, opacity: 0, duration: 0.5, delay: 0.15, ease: 'power3.out' });
        gsap.from('#formSection', { x: 20, opacity: 0, duration: 0.5, delay: 0.2, ease: 'power3.out' });
    });

    document.addEventListener('DOMContentLoaded', () => {
        const formSection = document.getElementById('formSection');
        const toggle = document.querySelector('.form-toggle');
        toggle.addEventListener('click', () => formSection.classList.toggle('active'));

        if (window.innerWidth <= 768) {
            document.querySelector('.upload-text').textContent = 'Выберите или вставьте из буфера';
            document.querySelector('.upload-hint').textContent = '';
        }
    });

    function showNotification(message) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.textContent = message;
        notif.style.animation = 'notifIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';
        document.body.appendChild(notif);
        setTimeout(() => {
            notif.style.animation = 'notifOut 0.3s ease forwards';
            setTimeout(() => notif.remove(), 300);
        }, 2700);
    }

    function updateStats() {
        const total = figurines.length;
        const shipping = figurines.filter(f => f.shipping).length;
        const received = figurines.filter(f => f.received).length;
        const totalCost = figurines.reduce((sum, f) =>
            sum + (parseFloat(f.prepayment)||0) + (parseFloat(f.payment)||0)
                + (parseFloat(f.deliveryMoscow)||0) + (parseFloat(f.deliveryHome)||0), 0);

        document.getElementById('statsBar').innerHTML = `
            <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Всего</div></div>
            <div class="stat-card shipping-card"><div class="stat-value">${shipping}</div><div class="stat-label">В пути</div></div>
            <div class="stat-card"><div class="stat-value">${received}</div><div class="stat-label">Получено</div></div>
            <div class="stat-card accent"><div class="stat-value">${totalCost ? totalCost.toLocaleString('ru-RU') + ' ₽' : '—'}</div><div class="stat-label">Потрачено</div></div>
        `;
    }

    function getFilteredFigurines() {
        let filtered = [...figurines];
        if (currentFilter === 'shipping') filtered = filtered.filter(f => f.shipping && !f.received);
        else if (currentFilter === 'waiting') filtered = filtered.filter(f => !f.shipping && !f.received);
        else if (currentFilter === 'received') filtered = filtered.filter(f => f.received);
        if (searchQuery) filtered = filtered.filter(f => f.name.toLowerCase().includes(searchQuery.toLowerCase()));
        filtered.sort((a, b) => {
            switch(currentSort) {
                case 'date-added': return new Date(b.orderDate) - new Date(a.orderDate);
                case 'date-added-rev': return new Date(a.orderDate) - new Date(b.orderDate);
                case 'name-asc': return a.name.localeCompare(b.name, 'ru');
                case 'name-desc': return b.name.localeCompare(a.name, 'ru');
            }
        });
        return filtered;
    }

    function render() {
        updateStats();
        const filtered = getFilteredFigurines();

        if (!filtered.length) {
            let title = '', subtitle = '';
            if (searchQuery) { title = 'Ничего не найдено'; subtitle = 'Попробуйте изменить запрос или фильтр'; }
            else {
                switch(currentFilter) {
                    case 'shipping': title = 'Нет фигурок в пути'; subtitle = 'Кликните на карточку чтобы отметить «В пути»'; break;
                    case 'waiting': title = 'Нет ожидающих'; subtitle = 'Добавьте фигурку через форму'; break;
                    case 'received': title = 'Ничего не получено'; subtitle = 'Отметьте чекбокс у фигурки'; break;
                    default: title = 'Коллекция пуста'; subtitle = 'Добавьте первую фигурку через форму справа';
                }
            }
            list.innerHTML = `<div class="empty-state"><h3>${title}</h3><p>${subtitle}</p></div>`;
            return;
        }

        const isFirstRender = list.children.length === 0;
        list.innerHTML = filtered.map(fig => {
            const idx = figurines.indexOf(fig);
            const statusBadge = fig.received
                ? `<span class="status-badge received-badge">✓ Получено</span>`
                : fig.shipping
                    ? `<span class="status-badge shipping">↑ В пути</span>`
                    : `<span class="status-badge waiting">⏳ Ожидание</span>`;

            const vals = [Number(fig.prepayment)||0, Number(fig.payment)||0, Number(fig.deliveryMoscow)||0, Number(fig.deliveryHome)||0].filter(v=>v>0);
            const totalTag = vals.length >= 2
                ? `<span class="price-tag price-tag-total">Итого: <strong>${vals.reduce((s,v)=>s+v,0).toLocaleString('ru-RU')} ₽</strong></span>`
                : '';

            return `
            <div class="figurine-item ${fig.shipping?'shipping':''} ${fig.received?'received':''}" data-index="${idx}">
                <div class="figurine-photo ${fig.photo ? 'has-photo' : ''}">
                    ${fig.photo ? `<img src="${fig.photo}" alt="${fig.name}">` : `<svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M4 16L8.586 11.414C9.367 10.633 10.633 10.633 11.414 11.414L16 16M14 14L15.586 12.414C16.367 11.633 17.633 11.633 18.414 12.414L20 14M14 8H14.01" stroke="#333" stroke-width="1.5" stroke-linecap="round"/></svg>`}
                </div>
                <div class="figurine-info">
                    <div class="figurine-name">${fig.name}</div>
                    <div class="figurine-date">📅 ${formatDate(fig.orderDate)}</div>
                    ${statusBadge}
                    <div class="price-tags">
                        ${fig.prepayment ? `<span class="price-tag">Предоплата: <strong>${Number(fig.prepayment).toLocaleString('ru-RU')} ₽</strong></span>` : ''}
                        ${fig.payment ? `<span class="price-tag">Оплата: <strong>${Number(fig.payment).toLocaleString('ru-RU')} ₽</strong></span>` : ''}
                        ${fig.deliveryMoscow ? `<span class="price-tag">До Москвы: <strong>${Number(fig.deliveryMoscow).toLocaleString('ru-RU')} ₽</strong></span>` : ''}
                        ${fig.deliveryHome ? `<span class="price-tag">До дома: <strong>${Number(fig.deliveryHome).toLocaleString('ru-RU')} ₽</strong></span>` : ''}
                        ${totalTag}
                    </div>
                </div>
                <div class="mobile-bottom-bar">
                    <button class="icon-btn check ${fig.received ? 'checked' : ''}" onclick="toggleReceivedBtn(${idx}); event.stopPropagation();" title="Получено">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </button>
                    <button class="icon-btn edit" onclick="openEdit(${idx}); event.stopPropagation();" title="Редактировать">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="icon-btn delete" onclick="deleteFigurine(${idx}); event.stopPropagation();" title="Удалить">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
                <div class="figurine-actions">
                    <button class="icon-btn check ${fig.received ? 'checked' : ''}" onclick="toggleReceivedBtn(${idx}); event.stopPropagation();" title="Получено">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </button>
                    <button class="icon-btn edit" onclick="openEdit(${idx}); event.stopPropagation();" title="Редактировать">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="icon-btn delete" onclick="deleteFigurine(${idx}); event.stopPropagation();" title="Удалить">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
            </div>`;
        }).join('');

        if (isFirstRender) {
            gsap.from('.figurine-item', { y: 16, opacity: 0, duration: 0.4, stagger: 0.07, ease: 'power3.out' });
        }

        document.querySelectorAll('.figurine-item').forEach(item => {
            item.addEventListener('click', e => {
                // Photo click -> lightbox
                const photoDiv = e.target.closest('.figurine-photo.has-photo');
                if (photoDiv) {
                    const img = photoDiv.querySelector('img');
                    const idx = parseInt(item.dataset.index);
                    if (img) openLightbox(img.src, figurines[idx].name);
                    return;
                }
                if (e.target.closest('.icon-btn') || e.target.closest('.received-checkbox')) return;
                toggleShipping(parseInt(item.dataset.index));
            });
        });
    }

    function formatDate(str) {
        return new Date(str).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function clearForm() {
        ['name','prepayment','payment','deliveryMoscow','deliveryHome'].forEach(id => document.getElementById(id).value = '');
        preview.style.display = 'none';
        uploadArea.querySelector('.upload-text').textContent = 'Перетащите или вставьте';
        currentImage = null;
    }

    function toggleShipping(idx) {
        if (figurines[idx].received) return;
        figurines[idx].shipping = !figurines[idx].shipping;
        render();
    }

    window.toggleReceived = (idx, checkbox) => {
        figurines[idx].received = checkbox.checked;
        if (figurines[idx].received) figurines[idx].shipping = false;
        render();
    };

    window.toggleReceivedBtn = (idx) => {
        figurines[idx].received = !figurines[idx].received;
        if (figurines[idx].received) figurines[idx].shipping = false;
        render();
    };

    window.openEdit = idx => {
        if (figurines[idx].received) return;
        editingIndex = idx;
        const fig = figurines[idx];
        document.getElementById('editName').value = fig.name;
        document.getElementById('editOrderDate').value = fig.orderDate;
        document.getElementById('editPrepayment').value = fig.prepayment || '';
        document.getElementById('editPayment').value = fig.payment || '';
        document.getElementById('editDeliveryMoscow').value = fig.deliveryMoscow || '';
        document.getElementById('editDeliveryHome').value = fig.deliveryHome || '';
        editModal.classList.add('active');
        gsap.from('#modalBox', { scale: 0.94, opacity: 0, duration: 0.3, ease: 'power3.out' });
    };

    document.getElementById('saveEditBtn').onclick = () => {
        if (editingIndex === null) return;
        const name = document.getElementById('editName').value.trim();
        if (!name) { alert('Введите название'); return; }
        figurines[editingIndex] = {
            ...figurines[editingIndex], name,
            orderDate: document.getElementById('editOrderDate').value,
            prepayment: document.getElementById('editPrepayment').value,
            payment: document.getElementById('editPayment').value,
            deliveryMoscow: document.getElementById('editDeliveryMoscow').value,
            deliveryHome: document.getElementById('editDeliveryHome').value
        };
        editModal.classList.remove('active');
        render();
        showNotification('✓ Изменения сохранены');
    };

    document.getElementById('cancelEditBtn').onclick = () => editModal.classList.remove('active');
    editModal.onclick = e => { if (e.target === editModal) editModal.classList.remove('active'); };

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            render();
        });
    });

    searchInput.addEventListener('input', e => { searchQuery = e.target.value; render(); });
    clearSearch.addEventListener('click', () => { searchInput.value = ''; searchQuery = ''; render(); });
    sortSelect.addEventListener('change', e => { currentSort = e.target.value; render(); });

    function processImage(file) {
        if (!file?.type.startsWith('image/')) { alert('Выберите изображение'); return; }
        const reader = new FileReader();
        reader.onload = e => {
            currentImage = e.target.result;
            preview.src = currentImage;
            preview.style.display = 'block';
            uploadArea.querySelector('.upload-text').textContent = '✓ Загружено';
        };
        reader.readAsDataURL(file);
    }

    // Restrict number inputs to digits only
    document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('keydown', e => {
            const allowed = ['Backspace','Delete','Tab','ArrowLeft','ArrowRight','Home','End'];
            if (allowed.includes(e.key)) return;
            if (!/^\d$/.test(e.key)) e.preventDefault();
        });
        input.addEventListener('paste', e => {
            const text = e.clipboardData.getData('text');
            if (!/^\d+$/.test(text)) e.preventDefault();
        });
    });

    document.getElementById('fileBtn').onclick = () => fileInput.click();
    fileInput.onchange = e => e.target.files[0] && processImage(e.target.files[0]);



    uploadArea.ondragover = e => { e.preventDefault(); uploadArea.classList.add('drag-over'); };
    uploadArea.ondragleave = () => uploadArea.classList.remove('drag-over');
    uploadArea.ondrop = e => { e.preventDefault(); uploadArea.classList.remove('drag-over'); e.dataTransfer.files[0] && processImage(e.dataTransfer.files[0]); };

    document.addEventListener('paste', e => {
        for (const item of e.clipboardData.items)
            if (item.type.startsWith('image/')) {
                e.preventDefault();
                processImage(item.getAsFile());
                return;
            }
    });

    document.getElementById('addBtn').onclick = () => {
        const name = document.getElementById('name').value.trim();
        const orderDate = document.getElementById('orderDate').value;
        if (!name || !orderDate) { alert('Заполните обязательные поля'); return; }
        figurines.push({
            id: Date.now(), name, photo: currentImage, orderDate,
            prepayment: document.getElementById('prepayment').value,
            payment: document.getElementById('payment').value,
            deliveryMoscow: document.getElementById('deliveryMoscow').value,
            deliveryHome: document.getElementById('deliveryHome').value,
            shipping: false, received: false
        });
        clearForm();
        render();
        showNotification('✓ Фигурка добавлена!');
    };

    // Custom confirm dialog
    let confirmCallback = null;
    const confirmOverlay = document.getElementById('confirmOverlay');
    const confirmOk = document.getElementById('confirmOk');
    const confirmCancel = document.getElementById('confirmCancel');
    const confirmText = document.getElementById('confirmText');

    function showConfirm(text, onOk) {
        confirmText.textContent = text;
        confirmCallback = onOk;
        confirmOverlay.classList.add('active');
        gsap.from('#confirmBox', { scale: 0.94, opacity: 0, duration: 0.25, ease: 'power3.out' });
    }

    confirmOk.addEventListener('click', () => {
        confirmOverlay.classList.remove('active');
        if (confirmCallback) { confirmCallback(); confirmCallback = null; }
    });
    confirmCancel.addEventListener('click', () => {
        confirmOverlay.classList.remove('active');
        confirmCallback = null;
    });
    confirmOverlay.addEventListener('click', e => {
        if (e.target === confirmOverlay) { confirmOverlay.classList.remove('active'); confirmCallback = null; }
    });

    window.deleteFigurine = idx => {
        showConfirm(`Фигурка "${figurines[idx].name}" будет удалена безвозвратно.`, () => {
            figurines.splice(idx, 1);
            render();
            showNotification('✓ Фигурка удалена');
        });
    };

    document.getElementById('resetBtn').onclick = () => {
        showConfirm('Все фигурки будут удалены безвозвратно.', () => { figurines = []; render(); showNotification('✓ Все данные удалены'); });
    };

    document.getElementById('exportBtn').onclick = () => {
        if (!figurines.length) { alert('Нечего сохранять'); return; }
        const blob = new Blob([JSON.stringify(figurines, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `figurines_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showNotification('✓ Файл сохранён!');
    };

    document.getElementById('importBtn').onclick = () => importFileInput.click();
    importFileInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = event => {
            try {
                const data = JSON.parse(event.target.result);
                if (!Array.isArray(data)) { alert('Неверный формат файла'); return; }
                if (figurines.length > 0) {
                    showConfirm(`Текущие ${figurines.length} фигурок будут заменены загруженными данными.`, () => {
                        figurines = data;
                        render();
                        showNotification(`✓ Загружено ${figurines.length} фигурок!`);
                    });
                    return;
                }
                figurines = data;
                render();
                showNotification(`✓ Загружено ${figurines.length} фигурок!`);
            } catch { alert('Ошибка чтения файла'); }
        };
        reader.readAsText(file);
        importFileInput.value = '';
    };

    // Lightbox
    const lightboxOverlay = document.getElementById('lightboxOverlay');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    function openLightbox(src, name) {
        gsap.killTweensOf(lightboxImg);
        lightboxImg.src = src;
        lightboxImg.alt = name;
        gsap.set(lightboxImg, { opacity: 0, scale: 0.88 });
        lightboxOverlay.classList.add('active');
        gsap.to(lightboxImg, { opacity: 1, scale: 1, duration: 0.3, ease: 'power3.out' });
    }

    function closeLightbox() {
        gsap.killTweensOf(lightboxImg);
        gsap.to(lightboxImg, { scale: 0.88, opacity: 0, duration: 0.2, ease: 'power2.in', onComplete: () => {
            lightboxOverlay.classList.remove('active');
            lightboxImg.src = '';
        }});
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxOverlay.addEventListener('click', e => { if (e.target === lightboxOverlay) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    render();
</script>
</body>
</html>
